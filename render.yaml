services:
  - type: web
    name: muze-app
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: JWT_SECRET
        value: MuzeMusic2026-SuperSecretKey-ChangeThis!
